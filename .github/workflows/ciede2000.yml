name: Kotlin CIEDE2000 Testing

on:
  workflow_dispatch:

env:
  n_csv_lines: 10000000

jobs:
  test-implementation-de00-kt:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - uses: fwilhe2/setup-kotlin@main

      - name: 📦 Set up Kotlin, Java and GCC
        run: |
          if ! command -v kotlinc > /dev/null; then
            wget --no-verbose --no-check-certificate --timeout=5 --tries=3 https://get.sdkman.io -O- | bash
            printf '%s\n' \
              "sdkman_auto_answer=true" \
              "sdkman_auto_selfupdate=true" > "$HOME/.sdkman/etc/config"
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install kotlin
          fi
          command -v java > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes default-jdk; }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: ⚙️ Compile Kotlin file
        run: |
          java -version
          kotlinc -version
          printf '%s\n' '' \
          'import kotlin.math.*' \
          'import java.io.File' \
          '' > exec.kt
          cat ciede2000.kt >> exec.kt
          printf '%s\n' '' \
          'fun main(args: Array<String>) {' \
          '	val canonical = 1 < args.size' \
          '	val filename = args[0]' \
          '	File(filename).forEachLine { line ->' \
          '		val parts = line.split(",")' \
          '		val deltaE = ciede2000(' \
          '			parts[0].toDouble(),' \
          '			parts[1].toDouble(),' \
          '			parts[2].toDouble(),' \
          '			parts[3].toDouble(),' \
          '			parts[4].toDouble(),' \
          '			parts[5].toDouble(),' \
          '			parts[6].toDouble(),' \
          '			parts[7].toDouble(),' \
          '			parts[8].toDouble(),' \
          '			canonical' \
          '		)' \
          '		println("$line,$deltaE")' \
          '	}' \
          '}' \
          '' >> exec.kt
          kotlinc exec.kt -include-runtime -d exec.jar

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: gcc --version && gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in Kotlin and stream to verifier
        run: |
          java -jar exec.jar test-cases.csv --canonical | ./ciede2000-native -o summary-canonical.txt &
          java -jar exec.jar test-cases.csv | ./ciede2000-native -o summary-simplified.txt &
          wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
